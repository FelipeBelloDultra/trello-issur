# Docker's embedded DNS at 127.0.0.11 — using a variable in proxy_pass (below)
# forces nginx to resolve "http" at request time instead of once at config
# load, so nginx doesn't crash-loop if it starts before the http service's
# DNS entry is registered (a real race we hit: a static `upstream {}` block
# resolves once at boot and fails hard with "host not found" if it loses it).
resolver 127.0.0.11 valid=10s;

server {
    listen 80;

    location / {
        set $upstream http://http:3000;
        proxy_pass         $upstream;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        add_header         X-Upstream-Addr   $upstream_addr;
    }
}
