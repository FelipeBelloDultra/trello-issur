x-app-env: &app-env
    environment:
        DB_HOST: postgres
        VALKEY_URL: redis://valkey:6379
        RABBITMQ_URL: amqp://${RABBITMQ_USER:-guest}:${RABBITMQ_PASSWORD:-guest}@rabbitmq:5672
        SMTP_HOST: mailpit
        S3_ENDPOINT: http://minio:9000
        OTEL_ENDPOINT: http://jaeger:4318/v1/traces

services:
    http:
        build:
            context: .
            target: dev-watch
        command: pnpm run dev:http
        volumes:
            - ./src:/app/src
        deploy:
            replicas: 2
        env_file: .env
        <<: *app-env
        depends_on:
            postgres:
                condition: service_healthy
            rabbitmq:
                condition: service_healthy
            valkey:
                condition: service_started
            minio:
                condition: service_started
        networks:
            - trello-issur-net

    queue:
        build:
            context: .
            target: dev-watch
        command: pnpm run dev:queue
        volumes:
            - ./src:/app/src
        env_file: .env
        <<: *app-env
        depends_on:
            postgres:
                condition: service_healthy
            rabbitmq:
                condition: service_healthy
        networks:
            - trello-issur-net

    nginx:
        image: nginx:1.27-alpine
        ports:
            - "3000:80"
        volumes:
            - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
        depends_on:
            - http
        networks:
            - trello-issur-net
