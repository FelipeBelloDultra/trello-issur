x-app-env: &app-env
    environment:
        DB_HOST: postgres
        VALKEY_URL: redis://valkey:6379
        RABBITMQ_URL: amqp://${RABBITMQ_USER:-guest}:${RABBITMQ_PASSWORD:-guest}@rabbitmq:5672
        SMTP_HOST: mailpit
        S3_ENDPOINT: http://minio:9000
        OTEL_ENDPOINT: http://jaeger:4318/v1/traces

services:
    http:
        build:
            context: .
            target: dev-watch
        command: pnpm run dev:http
        volumes:
            - ./src:/app/src
        deploy:
            replicas: 2
        env_file: .env
        <<: *app-env
        depends_on:
            postgres:
                condition: service_healthy
            rabbitmq:
                condition: service_healthy
            valkey:
                condition: service_started
            minio:
                condition: service_started
        networks:
            - trello-issur-net

    queue:
        build:
            context: .
            target: dev-watch
        command: pnpm run dev:queue
        volumes:
            - ./src:/app/src
        env_file: .env
        <<: *app-env
        depends_on:
            postgres:
                condition: service_healthy
            rabbitmq:
                condition: service_healthy
        networks:
            - trello-issur-net

    nginx:
        image: nginx:1.27-alpine
        ports:
            - "3000:80"
        volumes:
            - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
        depends_on:
            - http
        networks:
            - trello-issur-net

    postgres-exporter:
        image: prometheuscommunity/postgres-exporter:v0.15.0
        env_file: .env
        environment:
            DATA_SOURCE_NAME: "postgresql://${DB_USER}:${DB_PASSWORD}@postgres:5432/${DB_NAME}?sslmode=disable"
        depends_on:
            postgres:
                condition: service_healthy
        networks:
            - trello-issur-net

    redis-exporter:
        image: oliver006/redis_exporter:v1.66.0
        environment:
            REDIS_ADDR: "redis://valkey:6379"
        depends_on:
            - valkey
        networks:
            - trello-issur-net

    node-exporter:
        image: prom/node-exporter:v1.8.2
        pid: host
        volumes:
            - /proc:/host/proc:ro
            - /sys:/host/sys:ro
            - /:/rootfs:ro
        command:
            - "--path.procfs=/host/proc"
            - "--path.rootfs=/rootfs"
            - "--path.sysfs=/host/sys"
            - "--collector.filesystem.mount-points-exclude=^/(sys|proc|dev|host|etc)($$|/)"
        networks:
            - trello-issur-net

    prometheus:
        image: prom/prometheus:v3.1.0
        ports:
            - "9090:9090"
        volumes:
            - ./prometheus.yml:/etc/prometheus/prometheus.yml:ro
            - prometheus_data:/prometheus
        command:
            - "--config.file=/etc/prometheus/prometheus.yml"
            - "--storage.tsdb.path=/prometheus"
            - "--web.enable-lifecycle"
        depends_on:
            - http
        networks:
            - trello-issur-net

    grafana:
        image: grafana/grafana:11.4.0
        ports:
            - "3001:3000"
        environment:
            GF_SECURITY_ADMIN_USER: admin
            GF_SECURITY_ADMIN_PASSWORD: admin
            GF_USERS_ALLOW_SIGN_UP: "false"
        volumes:
            - ./grafana/provisioning:/etc/grafana/provisioning:ro
            - ./grafana/dashboards:/etc/grafana/dashboards:ro
            - grafana_data:/var/lib/grafana
        depends_on:
            - prometheus
        networks:
            - trello-issur-net

volumes:
    prometheus_data:
        driver: local
    grafana_data:
        driver: local
