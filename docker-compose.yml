x-app-env: &app-env
    environment:
        DB_HOST: postgres
        VALKEY_URL: redis://valkey:6379
        RABBITMQ_URL: amqp://${RABBITMQ_USER:-guest}:${RABBITMQ_PASSWORD:-guest}@rabbitmq:5672
        SMTP_HOST: mailpit
        S3_ENDPOINT: http://minio:9000
        OTEL_ENDPOINT: http://jaeger:4318/v1/traces

services:
    postgres:
        image: postgres:16-alpine
        env_file: .env
        ports:
            - "${DB_PORT:-5432}:5432"
        environment:
            POSTGRES_USER: ${DB_USER}
            POSTGRES_PASSWORD: ${DB_PASSWORD}
            POSTGRES_DB: ${DB_NAME}
        volumes:
            - postgres_data:/var/lib/postgresql/data
        healthcheck:
            test: ["CMD-SHELL", "pg_isready -U ${DB_USER} -d ${DB_NAME}"]
            interval: 10s
            timeout: 5s
            retries: 5
        networks:
            - trello-issur-net

    valkey:
        image: valkey/valkey:8-alpine
        ports:
            - "6379:6379"
        networks:
            - trello-issur-net

    rabbitmq:
        image: rabbitmq:4-management-alpine
        ports:
            - "${RABBITMQ_PORT:-5672}:5672"
            - "15672:15672"
        environment:
            RABBITMQ_DEFAULT_USER: ${RABBITMQ_USER:-guest}
            RABBITMQ_DEFAULT_PASS: ${RABBITMQ_PASSWORD:-guest}
        healthcheck:
            test: ["CMD", "rabbitmq-diagnostics", "ping"]
            interval: 10s
            timeout: 5s
            retries: 5
        networks:
            - trello-issur-net

    mailpit:
        image: axllent/mailpit:v1.21
        ports:
            - "${SMTP_PORT:-1025}:1025"
            - "8025:8025"
        networks:
            - trello-issur-net

    jaeger:
        image: jaegertracing/jaeger:2.18.0
        ports:
            - "16686:16686" # UI
            - "4318:4318" # OTLP/HTTP receiver
        networks:
            - trello-issur-net

    minio:
        image: minio/minio:RELEASE.2025-09-07T16-13-09Z
        ports:
            - "9000:9000" # S3 API
            - "9001:9001" # Console UI
        environment:
            MINIO_ROOT_USER: ${S3_ACCESS_KEY:-minioadmin}
            MINIO_ROOT_PASSWORD: ${S3_SECRET_KEY:-minioadmin}
        command: server --address ":9000" --console-address ":9001" /data
        volumes:
            - minio_data:/data
        networks:
            - trello-issur-net

    http:
        build:
            context: .
            target: dev-watch
        command: pnpm run dev:http
        volumes:
            - ./src:/app/src
        deploy:
            replicas: 2
        env_file: .env
        <<: *app-env
        depends_on:
            postgres:
                condition: service_healthy
            rabbitmq:
                condition: service_healthy
            valkey:
                condition: service_started
            minio:
                condition: service_started
        networks:
            - trello-issur-net

    queue:
        build:
            context: .
            target: dev-watch
        command: pnpm run dev:queue
        volumes:
            - ./src:/app/src
        env_file: .env
        <<: *app-env
        depends_on:
            postgres:
                condition: service_healthy
            rabbitmq:
                condition: service_healthy
        networks:
            - trello-issur-net

    nginx:
        image: nginx:1.27-alpine
        ports:
            - "3000:80"
        volumes:
            - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
        depends_on:
            - http
        networks:
            - trello-issur-net

volumes:
    postgres_data:
        driver: local
    minio_data:
        driver: local

networks:
    trello-issur-net:
