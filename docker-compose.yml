services:
    postgres:
        image: postgres:16-alpine
        env_file: .env
        ports:
            - "${DB_PORT:-5432}:5432"
        environment:
            POSTGRES_USER: ${DB_USER}
            POSTGRES_PASSWORD: ${DB_PASSWORD}
            POSTGRES_DB: ${DB_NAME}
        volumes:
            - postgres_data:/var/lib/postgresql/data
        healthcheck:
            test: ["CMD-SHELL", "pg_isready -U ${DB_USER} -d ${DB_NAME}"]
            interval: 10s
            timeout: 5s
            retries: 5
        networks:
            - trello-issur-net

    valkey:
        image: valkey/valkey:8-alpine
        ports:
            - "6379:6379"
        networks:
            - trello-issur-net

    rabbitmq:
        image: rabbitmq:4-management-alpine
        ports:
            - "${RABBITMQ_PORT:-5672}:5672"
            - "15672:15672"
        environment:
            RABBITMQ_DEFAULT_USER: ${RABBITMQ_USER:-guest}
            RABBITMQ_DEFAULT_PASS: ${RABBITMQ_PASSWORD:-guest}
        healthcheck:
            test: ["CMD", "rabbitmq-diagnostics", "ping"]
            interval: 10s
            timeout: 5s
            retries: 5
        networks:
            - trello-issur-net

    mailpit:
        image: axllent/mailpit:v1.21
        ports:
            - "${SMTP_PORT:-1025}:1025"
            - "8025:8025"
        networks:
            - trello-issur-net

    jaeger:
        image: jaegertracing/jaeger:2.18.0
        ports:
            - "16686:16686" # UI
            - "4318:4318" # OTLP/HTTP receiver
        networks:
            - trello-issur-net

volumes:
    postgres_data:
        driver: local

networks:
    trello-issur-net:
