global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  - job_name: trello-issur
    static_configs:
      - targets:
          - http:3000
    metrics_path: /api/metrics

  - job_name: rabbitmq
    static_configs:
      - targets:
          - rabbitmq:15692

  - job_name: postgres
    static_configs:
      - targets:
          - postgres-exporter:9187

  - job_name: valkey
    static_configs:
      - targets:
          - redis-exporter:9121

  - job_name: node
    static_configs:
      - targets:
          - node-exporter:9100
